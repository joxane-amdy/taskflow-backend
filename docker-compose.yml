services:

  db:
    image: mysql:8
    container_name: taskflow
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: taskflow-db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: taskflow-api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PASSWORD: root123
      DB_NAME: taskflow-db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: